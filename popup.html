<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Converter</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
      width: 320px;
      background-color: white;
      padding: 16px; /* p-4 */
      font-size: 14px; /* text-sm */
      margin: 0;
      color: #374151; /* Default text color, approx gray-700 */
    }

    .popup-container {
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px; /* gap-2 */
      margin-bottom: 8px; /* mb-2 */
    }

    .header-icon svg {
      width: 20px; /* h-5 w-5 */
      height: 20px;
      color: #2563eb; /* text-blue-600 */
    }

    .header h1 {
      font-size: 16px; /* Slightly larger than text-sm for a title */
      font-weight: 600; /* font-semibold */
      margin: 0;
      color: #1f2937; /* gray-800 */
    }

    .description {
      font-size: 12px; /* text-xs */
      color: #6b7280; /* text-gray-500 */
      margin-bottom: 16px; /* mb-4 */
      margin-top: 0;
    }

    .info-footer {
      margin-top: 12px; /* mt-3 */
      padding-top: 8px; /* pt-2 */
      border-top: 1px solid #e5e7eb; /* border-t border-gray-200 */
      font-size: 12px; /* text-xs */
      color: #6b7280; /* text-gray-500 */
      text-align: left;
    }

    button {
      width: 100%;
      padding: 8px 12px; /* Adjust padding to match UI */
      font-size: 14px;
      font-weight: 500;
      border: 1px solid transparent;
      border-radius: 6px; /* rounded-md */
      cursor: pointer;
      transition: background-color 0.2s ease, border-color 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px; /* For icon and text */
      background-color: #2563eb; /* bg-blue-600 */
      color: white;
    }

    button:hover {
      background-color: #1d4ed8; /* hover:bg-blue-700 */
    }

    button:disabled {
      background-color: #9ca3af; /* A generic disabled color */
      color: #e5e7eb;
      cursor: not-allowed;
    }
    
    .loader {
      border: 2px solid #f3f3f3; /* Light grey */
      border-top: 2px solid #2563eb; /* Blue */
      border-radius: 50%;
      width: 16px; /* h-4 w-4 */
      height: 16px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .markdown-preview-area {
      border-radius: 6px; /* rounded-md */
      border: 1px solid #e5e7eb; /* border border-gray-200 */
      background-color: #f9fafb; /* bg-gray-50 */
      padding: 12px; /* p-3 */
      margin-bottom: 16px; /* from space-y-4 on parent */
    }

    .markdown-preview-area pre {
      max-height: 150px;
      overflow: auto;
      font-size: 12px; /* text-xs */
      margin: 0;
      white-space: pre-wrap; /* To wrap text */
      word-break: break-all; /* To break long words */
      font-family: "SF Mono", "Monaco", "Consolas", monospace;
      color: #374151; /* gray-700 */
    }
    
    .button-icon {
      width: 16px;
      height: 16px;
    }

    .button-row {
      display: flex;
      gap: 8px;
    }

    .button-row button:first-child {
      flex: 1;
    }

    .icon-btn {
      width: auto;
      flex-shrink: 0;
      padding: 8px 12px;
    }

    .option-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .option-row input {
      margin: 0;
      cursor: pointer;
      accent-color: #2563eb;
    }

    .option-row label {
      font-size: 12px; /* text-xs */
      color: #6b7280; /* text-gray-500 */
      cursor: pointer;
    }

    .hidden {
      display: none !important; /* Important to override other display properties */
    }
  </style>
</head>
<body>
  <div class="popup-container">
    <div class="header">
      <span class="header-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><line x1="10" y1="9" x2="8" y2="9"></line></svg>
      </span>
      <h1>Markdown Converter</h1>
    </div>
    <p class="description">Convert current page to Markdown format</p>

    <div class="option-row hidden" id="articleModeRow">
      <input type="checkbox" id="articleModeToggle">
      <label for="articleModeToggle">Article only (strip nav, sidebars &amp; clutter)</label>
    </div>

    <div class="action-area">
      <div id="initialView">
        <button id="convertToMarkdownBtn">Convert to Markdown</button>
      </div>

      <div id="convertingView" class="hidden">
        <button id="convertingBtn" disabled>
          <div class="loader"></div>
          Converting...
        </button>
      </div>

      <div id="convertedView" class="hidden">
        <div class="markdown-preview-area">
          <pre id="markdownOutput"> </pre> <!-- Placeholder, will be filled by JS -->
        </div>
        <div class="button-row">
          <button id="copyMarkdownBtn">
            <img src="images/Content copy.svg" alt="Copy" class="button-icon lucide-clipboard" id="copyIconClipboard">
            <svg class="button-icon lucide-check hidden" id="copyIconCheck" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            <span id="copyButtonText">Copy Markdown</span>
          </button>
          <button id="downloadMarkdownBtn" class="icon-btn" title="Download as .md file">
            <svg class="button-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
          </button>
        </div>
      </div>
    </div>

    <div class="info-footer" id="infoText">
      Click to convert the current page
    </div>
  </div>

  <script src="turndown.js"></script>
  <script src="turndown-plugin-gfm.js"></script>
  <script src="setup-turndown.js"></script>
  <script src="popup.js"></script>
</body>
</html>
